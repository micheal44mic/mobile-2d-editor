<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Mobile 2D Editor</title>
    <link rel="stylesheet" href="./src/styles/styles.css">
  </head>
  <body>
    <main class="app-shell" data-app-shell>
      <section class="editor-stage" aria-label="Editor 2D">
        <canvas class="editor-viewport" data-editor-viewport aria-label="Viewport documento"></canvas>

        <div class="top-strip" aria-label="Stato documento">
          <span class="status-pill" data-document-size>4096 x 4096</span>
          <span class="status-pill" data-zoom-label>100%</span>
          <span class="status-pill" data-image-status hidden></span>
          <input class="file-input" data-image-input type="file" accept="image/*" aria-label="Carica immagine">
          <button class="icon-button is-active" type="button" data-brush-toggle aria-label="Pennello" aria-pressed="true">
            <span aria-hidden="true">✎</span>
          </button>
          <button class="icon-button" type="button" data-image-upload aria-label="Carica immagine">
            <span aria-hidden="true">＋</span>
          </button>
          <button class="icon-button" type="button" data-reset-view aria-label="Centra documento">
            <span aria-hidden="true">⌂</span>
          </button>
        </div>

        <div class="bottom-strip" aria-label="Grandezza pennello">
          <button class="tool-button" type="button" data-brush-size-down aria-label="Riduci pennello">−</button>
          <input class="control-range" data-brush-size-range type="range" min="1" max="128" value="22" aria-label="Grandezza pennello in pixel">
          <span class="status-pill brush-size-label" data-brush-size-label>22 px</span>
          <button class="tool-button" type="button" data-brush-size-up aria-label="Aumenta pennello">+</button>
        </div>

        <aside class="perf-panel" data-perf-panel hidden aria-label="Profiler prestazioni"></aside>
      </section>
    </main>

    <script defer src="./src/brushes/brush-presets.js"></script>
    <script defer src="./src/brushes/brush-textures.js"></script>
    <script defer src="./src/brushes/brush-engine.js"></script>
    <script defer src="./src/app.js"></script>
  </body>
</html>
